name: Build EXE and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd ImanAccounting
        pip install PyQt5 cryptography pyinstaller
    
    - name: Build EXE
      run: |
        cd ImanAccounting
        pyinstaller --noconfirm --onefile --windowed --name ImanAccounting main.py
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ImanAccounting/dist/ImanAccounting.exe
        tag_name: "build-${{ github.run_number }}"
        name: "ImanAccounting Build ${{ github.run_number }}"
        body: "خروجی خودکار از GitHub Actions"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
