name: Build EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: List files (debug)
      run: |
        echo "=== Root ==="
        dir
        echo "=== ImanAccounting folder ==="
        dir ImanAccounting
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd ImanAccounting
        pip install PyQt5 cryptography
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        cd ImanAccounting
        pyinstaller --noconfirm --onefile --windowed `
          --name "ImanAccounting" `
          --add-data "styles.qss;." `
          --hidden-import "cryptography" `
          --hidden-import "PyQt5" `
          main.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ImanAccounting
        path: ImanAccounting/dist/ImanAccounting.exe
