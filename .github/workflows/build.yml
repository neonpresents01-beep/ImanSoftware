name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install PyQt5 cryptography
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed `
          --name "ImanAccounting" `
          --add-data "styles.qss;." `
          --hidden-import "cryptography" `
          --hidden-import "PyQt5" `
          main.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ImanAccounting
        path: dist/ImanAccounting.exe
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/ImanAccounting.exe
        name: "ImanAccounting ${{ github.ref_name }}"
        body: |
          ## دانلود نسخه ${{ github.ref_name }}
          
          ### نحوه استفاده:
          ۱. فایل EXE را دانلود کنید
          ۲. فایل license.key را کنار آن قرار دهید
          ۳. برنامه را اجرا کنید
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
