name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install
      run: |
        cd ImanAccounting
        pip install PyQt5 cryptography pyinstaller
    
    - name: Build
      run: |
        cd ImanAccounting
        pyinstaller --noconfirm --onefile --windowed --name "ImanAccounting" main.py
    
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: ImanAccounting/dist/ImanAccounting.exe
        tag_name: "v${{ github.run_number }}"
        name: "Build ${{ github.run_number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ImanAccounting/dist/ImanAccounting.exe
        name: "ImanAccounting ${{ github.ref_name }}"
        body: "دانلود نسخه ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload to Release (manual)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        files: ImanAccounting/dist/ImanAccounting.exe
        name: "ImanAccounting Manual Build"
        body: "نسخه دستی - تاریخ: ${{ github.event.repository.updated_at }}"
        tag_name: "build-${{ github.run_number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}          --hidden-import "cryptography" `
          --hidden-import "PyQt5" `
          main.py
    
    - name: Create Release and Upload
      uses: softprops/action-gh-release@v2
      with:
        files: ImanAccounting/dist/ImanAccounting.exe
        name: "ImanAccounting ${{ github.ref_name }}"
        body: |
          ## 🎉 دانلود نسخه ${{ github.ref_name }}
          
          ### 📥 نحوه نصب:
          ۱. فایل EXE را دانلود کنید
          ۲. فایل license.key را کنار آن قرار دهید
          ۳. برنامه را اجرا کنید
          
          ### ✨ قابلیت‌ها:
          - 📊 حسابداری کامل
          - 📦 انبارداری
          - 💰 حقوق دستمزد
          - 🧠 ImanAI Core v6.2
          - 🧩 سیستم پلاگین
          
          ---
          **حجم:** ~40 MB
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "ImanAccounting Build ${{ github.run_number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload EXE to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ImanAccounting/dist/ImanAccounting.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        cd ImanAccounting
        pyinstaller --noconfirm --onefile --windowed `
          --name "ImanAccounting" `
          --add-data "styles.qss;." `
          --hidden-import "cryptography" `
          --hidden-import "PyQt5" `
          main.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ImanAccounting
        path: ImanAccounting/dist/ImanAccounting.exe
